<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>margin.at — Annotation Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #faf8f5;
    --white: #ffffff;
    --ink: #1a1814;
    --ink-light: #6b6560;
    --ink-faint: #b8b3ad;
    --rule: #e8e4de;
    --accent: #c85a2a;
    --accent-light: #f5ede7;
    --success: #2a7a4b;
    --error: #b83a2a;
    --sidebar-w: 260px;
    --header-h: 60px;
  }

  html, body {
    height: 100%;
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ─────────────────────────────── */
  #app { display: flex; flex-direction: column; height: 100vh; }

  header {
    height: var(--header-h);
    background: var(--white);
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Lora', serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.3px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
  }

  .header-right { display: flex; align-items: center; gap: 12px; }

  #auth-badge {
    font-size: 12px;
    color: var(--ink-light);
    font-family: 'DM Mono', monospace;
    display: none;
  }

  .body-wrap {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ─────────────────────────────── */
  aside {
    width: var(--sidebar-w);
    border-right: 1px solid var(--rule);
    background: var(--white);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--rule);
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 10px;
  }

  .collection-list { list-style: none; }

  .collection-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
    gap: 8px;
  }

  .collection-item:hover { background: var(--cream); }
  .collection-item.active { background: var(--accent-light); }
  .collection-item.active .coll-name { color: var(--accent); font-weight: 500; }

  .coll-name {
    font-size: 13.5px;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .coll-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    background: var(--cream);
    padding: 1px 6px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .sidebar-empty {
    padding: 12px 10px;
    font-size: 13px;
    color: var(--ink-faint);
    font-style: italic;
  }

  /* ── Main ─────────────────────────────────── */
  main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* ── Login screen ─────────────────────────── */
  #login-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .login-card {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 40px 44px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.04);
  }

  .login-card h2 {
    font-family: 'Lora', serif;
    font-size: 24px;
    font-weight: 400;
    margin-bottom: 6px;
  }

  .login-card p {
    font-size: 13.5px;
    color: var(--ink-light);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .login-card p a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid currentColor;
  }

  .field { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-light);
    letter-spacing: 0.3px;
    margin-bottom: 6px;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 10px 13px;
    border: 1px solid var(--rule);
    border-radius: 7px;
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--accent);
    background: var(--white);
  }

  input::placeholder { color: var(--ink-faint); }

  .hint {
    font-size: 11.5px;
    color: var(--ink-faint);
    margin-top: 5px;
  }

  .hint a { color: var(--accent); text-decoration: none; }

  /* ── Buttons ─────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.14s;
    outline: none;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--ink);
    color: var(--white);
    width: 100%;
    justify-content: center;
    margin-top: 8px;
    padding: 11px;
    font-size: 14px;
  }

  .btn-primary:hover { background: #2e2b27; }
  .btn-primary:disabled { opacity: 0.45; cursor: default; }

  .btn-ghost {
    background: none;
    color: var(--ink-light);
    border-color: var(--rule);
    font-size: 12.5px;
    padding: 6px 13px;
  }

  .btn-ghost:hover { background: var(--cream); color: var(--ink); }

  .btn-accent {
    background: var(--accent);
    color: var(--white);
  }

  .btn-accent:hover { background: #b34d22; }

  /* ── Toolbar ─────────────────────────────── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--rule);
    background: var(--white);
    flex-shrink: 0;
    gap: 12px;
    flex-wrap: wrap;
  }

  .toolbar-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .toolbar-title {
    font-family: 'Lora', serif;
    font-size: 18px;
    font-weight: 500;
  }

  .toolbar-meta {
    font-size: 12px;
    color: var(--ink-faint);
    font-family: 'DM Mono', monospace;
  }

  .toolbar-right { display: flex; gap: 8px; align-items: center; }

  /* ── Filter bar ─────────────────────────── */
  .filter-bar {
    padding: 12px 28px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .type-filter {
    display: flex;
    gap: 4px;
  }

  .type-pill {
    padding: 4px 11px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--rule);
    background: none;
    color: var(--ink-light);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.12s;
  }

  .type-pill:hover { border-color: var(--ink-faint); color: var(--ink); }
  .type-pill.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

  /* ── Annotations ─────────────────────────── */
  .annotations-wrap {
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .annotation-card {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 20px 24px;
    transition: box-shadow 0.15s, border-color 0.15s;
    animation: fadeUp 0.2s ease both;
  }

  .annotation-card:hover {
    box-shadow: 0 3px 16px rgba(0,0,0,0.06);
    border-color: #d8d4ce;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .card-url {
    font-size: 11.5px;
    color: var(--ink-faint);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 10px;
  }

  .card-url a { color: inherit; text-decoration: none; }
  .card-url a:hover { color: var(--accent); }

  .card-quote {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 14.5px;
    color: var(--ink);
    line-height: 1.65;
    border-left: 2px solid var(--accent);
    padding-left: 14px;
    margin: 10px 0;
    opacity: 0.85;
  }

  .card-note {
    font-size: 14px;
    color: var(--ink-light);
    line-height: 1.6;
    margin: 8px 0;
  }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .type-badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
  }

  .type-badge.annotation { background: #eaf0fb; color: #2a5ab8; }
  .type-badge.highlight  { background: #fdf6e3; color: #8a6914; }
  .type-badge.bookmark   { background: var(--accent-light); color: var(--accent); }
  .type-badge.reply      { background: #edf7f0; color: var(--success); }

  .card-date {
    font-size: 11.5px;
    color: var(--ink-faint);
    font-family: 'DM Mono', monospace;
    margin-left: auto;
  }

  .tags-wrap { display: flex; gap: 5px; flex-wrap: wrap; }

  .tag {
    font-size: 11px;
    color: var(--ink-light);
    background: var(--cream);
    border: 1px solid var(--rule);
    padding: 1px 8px;
    border-radius: 10px;
  }

  /* ── Empty / loading / error ─────────────── */
  .state-box {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--ink-faint);
    padding: 60px 20px;
    text-align: center;
  }

  .state-icon { font-size: 36px; line-height: 1; }
  .state-title { font-size: 16px; color: var(--ink-light); font-weight: 500; }
  .state-sub { font-size: 13px; max-width: 300px; line-height: 1.5; }
  .state-error { color: var(--error); }

  .spinner {
    width: 26px; height: 26px;
    border: 2.5px solid var(--rule);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ─────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: var(--white);
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 8px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(6px);
    transition: all 0.2s;
    z-index: 999;
    max-width: 320px;
  }

  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { background: var(--error); }

  /* ── Export modal ────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--white);
    border-radius: 12px;
    padding: 32px 36px;
    width: 360px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    transform: translateY(8px);
    transition: transform 0.15s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h3 {
    font-family: 'Lora', serif;
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 6px;
  }

  .modal p {
    font-size: 13px;
    color: var(--ink-light);
    margin-bottom: 22px;
  }

  .export-options { display: flex; flex-direction: column; gap: 10px; }

  .export-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    cursor: pointer;
    background: none;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.12s;
    text-align: left;
  }

  .export-btn:hover { background: var(--cream); border-color: #d0cbc4; }

  .export-btn-info .name { font-size: 14px; font-weight: 500; color: var(--ink); }
  .export-btn-info .desc { font-size: 12px; color: var(--ink-faint); }
  .export-ext { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ink-faint); }

  .modal-footer { margin-top: 16px; display: flex; justify-content: flex-end; }

  /* ── Scrollbar ─────────────────────────── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 10px; }

  /* ── Responsive ─────────────────────────── */
  @media (max-width: 640px) {
    aside { width: 200px; }
    .toolbar, .filter-bar, .annotations-wrap { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">
      <span class="logo-dot"></span>
      margin.at
    </div>
    <div class="header-right">
      <span id="auth-badge"></span>
      <button class="btn btn-ghost" id="logout-btn" style="display:none" onclick="logout()">Sign out</button>
    </div>
  </header>

  <div class="body-wrap" id="body-wrap">

    <!-- Login -->
    <div id="login-screen" style="width:100%">
      <div class="login-card">
        <h2>Sign in to margin.at</h2>
        <p>Enter your AT Protocol handle and an app password to view your annotations.<br>
           <a href="https://bsky.app/settings/app-passwords" target="_blank">Generate an app password →</a>
        </p>
        <div class="field">
          <label>Handle</label>
          <input type="text" id="handle-input" placeholder="yourname.bsky.social" autocomplete="username" />
        </div>
        <div class="field">
          <label>App password</label>
          <input type="password" id="password-input" placeholder="xxxx-xxxx-xxxx-xxxx" autocomplete="current-password" />
          <div class="hint">
            Not your main password — create one at
            <a href="https://bsky.app/settings/app-passwords" target="_blank">bsky.app/settings/app-passwords</a>
          </div>
        </div>
        <button class="btn btn-primary" id="login-btn" onclick="login()">Connect</button>
        <div id="login-error" style="font-size:13px;color:var(--error);margin-top:12px;display:none"></div>
      </div>
    </div>

    <!-- Main app (hidden until logged in) -->
    <aside id="sidebar" style="display:none">
      <div class="sidebar-section">
        <div class="sidebar-label">Collections</div>
        <ul class="collection-list" id="collection-list">
          <li class="sidebar-empty">Loading…</li>
        </ul>
      </div>
    </aside>

    <main id="main-panel" style="display:none">
      <!-- content injected here -->
    </main>

  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="export-modal">
  <div class="modal">
    <h3>Export annotations</h3>
    <p id="export-modal-desc">Choose a format to download your annotations.</p>
    <div class="export-options">
      <button class="export-btn" onclick="doExport('json')">
        <div class="export-btn-info">
          <div class="name">JSON</div>
          <div class="desc">Full data, great for developers</div>
        </div>
        <span class="export-ext">.json</span>
      </button>
      <button class="export-btn" onclick="doExport('csv')">
        <div class="export-btn-info">
          <div class="name">CSV</div>
          <div class="desc">Spreadsheet-friendly, flat table</div>
        </div>
        <span class="export-ext">.csv</span>
      </button>
      <button class="export-btn" onclick="doExport('md')">
        <div class="export-btn-info">
          <div class="name">Markdown</div>
          <div class="desc">Readable document with quote formatting</div>
        </div>
        <span class="export-ext">.md</span>
      </button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeExportModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let session = null;
let pdsBase = null; // resolved dynamically from handle
let allCollections = [];
let activeCollection = null;
let activeAnnotations = [];
let activeFilter = 'all';

const NSID = {
  collection:      'at.margin.collection',
  collectionItem:  'at.margin.collectionItem',
  annotation:      'at.margin.annotation',
  highlight:       'at.margin.highlight',
  bookmark:        'at.margin.bookmark',
  reply:           'at.margin.reply',
};

const STORAGE_KEY = 'margin_at_creds';

// ─────────────────────────────────────────────
// PDS resolution via AT Protocol identity
// ─────────────────────────────────────────────
async function resolvePds(handle) {
  // 1. Resolve handle → DID via the global PLC directory
  const res = await fetch(`https://bsky.social/xrpc/com.atproto.identity.resolveHandle?handle=${encodeURIComponent(handle)}`);
  if (!res.ok) throw new Error(`Could not resolve handle "${handle}"`);
  const { did } = await res.json();

  // 2. Fetch DID document to find PDS endpoint
  let didDoc;
  if (did.startsWith('did:plc:')) {
    const r = await fetch(`https://plc.directory/${did}`);
    if (!r.ok) throw new Error(`Could not fetch DID document for ${did}`);
    didDoc = await r.json();
  } else if (did.startsWith('did:web:')) {
    const domain = did.replace('did:web:', '');
    const r = await fetch(`https://${domain}/.well-known/did.json`);
    if (!r.ok) throw new Error(`Could not fetch DID document for ${did}`);
    didDoc = await r.json();
  } else {
    throw new Error(`Unsupported DID method: ${did}`);
  }

  // 3. Extract PDS URL from service endpoints
  const svc = didDoc.service?.find(s =>
    s.id === '#atproto_pds' || s.type === 'AtprotoPersonalDataServer'
  );
  if (!svc?.serviceEndpoint) throw new Error(`No PDS found in DID document for ${did}`);

  return { did, pds: svc.serviceEndpoint.replace(/\/$/, '') };
}

// ─────────────────────────────────────────────
// Credential caching (localStorage)
// ─────────────────────────────────────────────
function saveCredentials(handle, password) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ handle, password }));
  } catch(e) {}
}

function loadCredentials() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function clearCredentials() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

// Pre-fill login form from cache on page load
(function prefillForm() {
  const creds = loadCredentials();
  if (!creds) return;
  document.getElementById('handle-input').value   = creds.handle   || '';
  document.getElementById('password-input').value = creds.password || '';
})();

// ─────────────────────────────────────────────
// AT Protocol helpers
// ─────────────────────────────────────────────
async function atRequest(path, params = {}, method = 'GET', body = null) {
  const url = new URL(`${pdsBase}/xrpc/${path}`);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(session ? { 'Authorization': `Bearer ${session.accessJwt}` } : {}),
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch(url, opts);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.message || err.error || `HTTP ${resp.status}`);
  }
  return resp.json();
}

async function listRecordsAll(did, collection) {
  const records = [];
  let cursor = undefined;
  while (true) {
    const params = { repo: did, collection, limit: 100 };
    if (cursor) params.cursor = cursor;
    const data = await atRequest('com.atproto.repo.listRecords', params);
    records.push(...(data.records || []));
    cursor = data.cursor;
    if (!cursor || !data.records?.length) break;
  }
  return records;
}

async function getRecord(did, collection, rkey) {
  return atRequest('com.atproto.repo.getRecord', { repo: did, collection, rkey });
}

function parseAtUri(uri) {
  // at://did/collection/rkey
  const parts = uri.replace('at://', '').split('/');
  return { did: parts[0], collection: parts[1], rkey: parts[2] };
}

// Extract a string URI from a field that might be:
//   - a plain string:              "at://did/col/rkey"
//   - a strong ref object:         { uri: "at://...", cid: "..." }
function uriFrom(field) {
  if (!field) return null;
  if (typeof field === 'string') return field;
  if (typeof field === 'object' && field.uri) return field.uri;
  return null;
}

// ─────────────────────────────────────────────
// Auth
// ─────────────────────────────────────────────
async function login() {
  const handle   = document.getElementById('handle-input').value.trim();
  const password = document.getElementById('password-input').value.trim();

  if (!handle || !password) { showError('Please enter your handle and app password.'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Resolving identity…';
  hideError();

  try {
    // Auto-discover PDS from handle
    const { pds } = await resolvePds(handle);
    pdsBase = pds;
    console.debug(`[margin.at] Resolved PDS for ${handle}: ${pds}`);

    btn.textContent = 'Connecting…';
    session = await atRequest('com.atproto.server.createSession', {}, 'POST',
      { identifier: handle, password });
    saveCredentials(handle, password);
    onLoggedIn();
  } catch(e) {
    showError(`Sign-in failed: ${e.message}`);
    btn.disabled = false;
    btn.textContent = 'Connect';
  }
}

function onLoggedIn() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('sidebar').style.display = 'flex';
  document.getElementById('main-panel').style.display = 'flex';
  document.getElementById('logout-btn').style.display = '';
  const badge = document.getElementById('auth-badge');
  badge.textContent = session.handle;
  badge.style.display = '';
  document.getElementById('main-panel').style.flexDirection = 'column';
  renderMainEmpty('Select a collection from the sidebar.');
  loadCollections();
}

function logout() {
  clearCredentials();
  session = null; allCollections = []; activeCollection = null; activeAnnotations = [];
  document.getElementById('login-screen').style.display = '';
  document.getElementById('sidebar').style.display = 'none';
  document.getElementById('main-panel').style.display = 'none';
  document.getElementById('logout-btn').style.display = 'none';
  document.getElementById('auth-badge').style.display = 'none';
  document.getElementById('login-screen').style.width = '100%';
  document.getElementById('handle-input').value = '';
  document.getElementById('password-input').value = '';
}

function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = '';
}

function hideError() {
  document.getElementById('login-error').style.display = 'none';
}

function handleEnter(e) {
  if (e.key === 'Enter') login();
}

document.getElementById('password-input').addEventListener('keydown', handleEnter);
document.getElementById('handle-input').addEventListener('keydown', handleEnter);

// ─────────────────────────────────────────────
// Collections
// ─────────────────────────────────────────────
async function loadCollections() {
  const listEl = document.getElementById('collection-list');
  listEl.innerHTML = '<li class="sidebar-empty">Loading…</li>';

  try {
    const records = await listRecordsAll(session.did, NSID.collection);
    allCollections = records;

    if (!records.length) {
      listEl.innerHTML = '<li class="sidebar-empty">No collections found.</li>';
      return;
    }

    listEl.innerHTML = '';
    records.forEach(rec => {
      const name = rec.value?.name || 'Untitled';
      const li = document.createElement('li');
      li.className = 'collection-item';
      li.dataset.uri = rec.uri;
      li.innerHTML = `
        <span class="coll-name" title="${escHtml(name)}">${escHtml(name)}</span>
        <span class="coll-count" id="count-${escAttr(rec.uri)}">—</span>
      `;
      li.addEventListener('click', () => selectCollection(rec));
      listEl.appendChild(li);
    });

  } catch(e) {
    listEl.innerHTML = `<li class="sidebar-empty" style="color:var(--error)">Error: ${escHtml(e.message)}</li>`;
  }
}

async function selectCollection(rec) {
  activeCollection = rec;
  activeFilter = 'all';

  document.querySelectorAll('.collection-item').forEach(el => {
    el.classList.toggle('active', el.dataset.uri === rec.uri);
  });

  const name = rec.value?.name || 'Untitled';
  renderLoading(`Loading "${name}"…`);

  try {
    const annotations = await fetchAnnotationsForCollection(rec.uri);
    activeAnnotations = annotations;

    const countEl = document.getElementById(`count-${escAttr(rec.uri)}`);
    if (countEl) countEl.textContent = annotations.length;

    renderAnnotations(annotations, name);
  } catch(e) {
    renderError(e.message);
  }
}

async function fetchAnnotationsForCollection(collectionUri) {
  // 1. Fetch all collectionItem records for this user
  const allItems = await listRecordsAll(session.did, NSID.collectionItem);

  // Show debug panel with raw data
  showDebug({
    collectionUri,
    totalCollectionItems: allItems.length,
    sampleItem: allItems[0] || null,
    allCollectionValues: allItems.map(i => ({
      itemUri: i.uri,
      collectionField: i.value?.collection,
      subjectField: i.value?.annotation,
    })),
  });

  if (allItems.length === 0) return [];

  // 2. Filter items belonging to this collection.
  //    The `collection` field may be a plain string or a strong ref { uri, cid }
  const items = allItems.filter(item => {
    const raw = item.value?.collection;
    const uri = uriFrom(raw);
    return uri === collectionUri;
  });

  if (items.length === 0) return [];

  // 3. Resolve each subject record
  const resolved = await Promise.allSettled(
    items.map(async item => {
      const subjectRaw = item.value?.annotation;
      const subjectUri = uriFrom(subjectRaw);
      if (!subjectUri) return null;
      try {
        const { did, collection, rkey } = parseAtUri(subjectUri);
        const rec = await getRecord(did, collection, rkey);
        rec._nsid    = collection;
        rec._itemUri = item.uri;
        return rec;
      } catch(e) {
        return { _error: e.message, _itemUri: item.uri, _rawSubject: subjectUri };
      }
    })
  );

  const results = resolved
    .filter(r => r.status === 'fulfilled' && r.value && !r.value._error)
    .map(r => r.value);

  // Update debug panel with resolved record samples
  showDebug({
    collectionUri,
    totalCollectionItems: allItems.length,
    matchedItems: items.length,
    resolvedCount: results.length,
    sampleCollectionItem: allItems[0]?.value || null,
    sampleResolvedRecord: results[0] || null,
    allResolvedValues: results.map(r => r.value),
  });

  return results;
}

// ─────────────────────────────────────────────
// Debug panel
// ─────────────────────────────────────────────
function showDebug(data) {
  // Remove old panel if present
  document.getElementById('debug-panel')?.remove();

  const panel = document.createElement('div');
  panel.id = 'debug-panel';
  panel.style.cssText = `
    position:fixed; bottom:0; left:0; right:0; max-height:40vh; overflow-y:auto;
    background:#1a1814; color:#e8e4de; font-family:'DM Mono',monospace; font-size:11px;
    line-height:1.5; z-index:9999; border-top:2px solid #c85a2a;
  `;

  const header = document.createElement('div');
  header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#2a2520;position:sticky;top:0;';
  header.innerHTML = `
    <span style="color:#c85a2a;font-weight:500;">⚙ margin.at debug</span>
    <button onclick="document.getElementById('debug-panel').remove()" style="background:none;border:none;color:#b8b3ad;cursor:pointer;font-size:13px;">✕</button>
  `;

  const body = document.createElement('pre');
  body.style.cssText = 'padding:12px 14px;margin:0;white-space:pre-wrap;word-break:break-all;';
  body.textContent = JSON.stringify(data, null, 2);

  panel.appendChild(header);
  panel.appendChild(body);
  document.body.appendChild(panel);
}

// ─────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────
function renderLoading(msg = 'Loading…') {
  document.getElementById('main-panel').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-title">${escHtml(msg)}</div>
    </div>`;
}

function renderMainEmpty(msg) {
  document.getElementById('main-panel').innerHTML = `
    <div class="state-box">
      <div class="state-icon">📖</div>
      <div class="state-title">No collection selected</div>
      <div class="state-sub">${escHtml(msg)}</div>
    </div>`;
}

function renderError(msg) {
  document.getElementById('main-panel').innerHTML = `
    <div class="state-box">
      <div class="state-icon">⚠️</div>
      <div class="state-title state-error">Something went wrong</div>
      <div class="state-sub">${escHtml(msg)}</div>
    </div>`;
}

function renderAnnotations(annotations, collName) {
  const panel = document.getElementById('main-panel');

  if (!annotations.length) {
    panel.innerHTML = `
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="toolbar-title">${escHtml(collName)}</div>
          <div class="toolbar-meta">0 annotations</div>
        </div>
      </div>
      <div class="state-box">
        <div class="state-icon">✦</div>
        <div class="state-title">No annotations found</div>
        <div class="state-sub">If you've added items to this collection in margin.at, open your browser's Developer Tools (⌘⌥I) → Console tab to see debug output about what was fetched.</div>
      </div>`;
    return;
  }

  // Gather types present
  const types = [...new Set(annotations.map(a => annType(a)))];

  panel.innerHTML = `
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="toolbar-title">${escHtml(collName)}</div>
        <div class="toolbar-meta" id="ann-count-label">${annotations.length} annotation${annotations.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-ghost" onclick="openExportModal()">Export</button>
      </div>
    </div>
    <div class="filter-bar">
      <div class="type-filter" id="type-filter">
        <button class="type-pill active" data-type="all" onclick="setFilter('all', this)">All</button>
        ${types.map(t => `<button class="type-pill" data-type="${t}" onclick="setFilter('${t}', this)">${capitalize(t)}</button>`).join('')}
      </div>
    </div>
    <div class="annotations-wrap" id="annotations-wrap"></div>
  `;

  renderCards(annotations);
}

function renderCards(annotations) {
  const wrap = document.getElementById('annotations-wrap');
  if (!wrap) return;

  const filtered = activeFilter === 'all'
    ? annotations
    : annotations.filter(a => annType(a) === activeFilter);

  const label = document.getElementById('ann-count-label');
  if (label) label.textContent = `${filtered.length} annotation${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    wrap.innerHTML = `<div class="state-box" style="padding:40px 0">
      <div class="state-sub">No ${activeFilter} annotations in this collection.</div>
    </div>`;
    return;
  }

  wrap.innerHTML = filtered.map((rec, i) => cardHTML(rec, i)).join('');
}

function cardHTML(rec, i) {
  const val   = rec.value || {};
  const type  = annType(rec);
  const url   = val.target?.source || '';
  const title = val.target?.title  || '';
  const quote = val.target?.selector?.exact || '';
  const note  = val.body?.value || (typeof val.body === 'string' ? val.body : '');
  const tags  = val.tags || [];
  const date  = val.createdAt ? formatDate(val.createdAt) : '';

  const delay = `animation-delay:${Math.min(i * 30, 300)}ms`;

  return `
  <div class="annotation-card" style="${delay}">
    <div class="card-header">
      ${title ? `<div class="card-title" title="${escHtml(title)}">${escHtml(title)}</div>` : '<div class="card-title" style="color:var(--ink-faint);font-style:italic;font-weight:400">Untitled</div>'}
    </div>
    ${url ? `<div class="card-url"><a href="${escHtml(url)}" target="_blank" title="${escHtml(url)}">${escHtml(truncate(url, 70))}</a></div>` : ''}
    ${quote ? `<div class="card-quote">${escHtml(quote)}</div>` : ''}
    ${note  ? `<div class="card-note">${escHtml(note)}</div>` : ''}
    <div class="card-footer">
      <span class="type-badge ${type}">${capitalize(type)}</span>
      ${tags.length ? `<div class="tags-wrap">${tags.map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}</div>` : ''}
      ${date ? `<span class="card-date">${date}</span>` : ''}
    </div>
  </div>`;
}

function setFilter(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.type-pill').forEach(el => el.classList.toggle('active', el.dataset.type === type));
  renderCards(activeAnnotations);
}

// ─────────────────────────────────────────────
// Export
// ─────────────────────────────────────────────
function openExportModal() {
  const name = activeCollection?.value?.name || 'collection';
  document.getElementById('export-modal-desc').textContent =
    `Exporting "${name}" — ${activeAnnotations.length} annotation${activeAnnotations.length !== 1 ? 's' : ''}.`;
  document.getElementById('export-modal').classList.add('open');
}

function closeExportModal() {
  document.getElementById('export-modal').classList.remove('open');
}

document.getElementById('export-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeExportModal();
});

function doExport(format) {
  closeExportModal();
  const name = (activeCollection?.value?.name || 'annotations').replace(/\s+/g, '_');

  if (format === 'json') {
    const data = activeAnnotations.map(flattenAnnotation);
    download(`${name}.json`, JSON.stringify(data, null, 2), 'application/json');
    toast('Exported as JSON');
  } else if (format === 'csv') {
    const rows = activeAnnotations.map(flattenAnnotation);
    if (!rows.length) return;
    const cols = Object.keys(rows[0]);
    const csv  = [cols.join(','), ...rows.map(r => cols.map(c => csvCell(r[c])).join(','))].join('\n');
    download(`${name}.csv`, csv, 'text/csv');
    toast('Exported as CSV');
  } else if (format === 'md') {
    const md = buildMarkdown(activeAnnotations, activeCollection?.value?.name || 'Annotations');
    download(`${name}.md`, md, 'text/markdown');
    toast('Exported as Markdown');
  }
}

function flattenAnnotation(rec) {
  const val  = rec.value || {};
  const type = annType(rec);
  return {
    uri:        rec.uri || '',
    type,
    url:        val.target?.source || '',
    title:      val.target?.title  || '',
    quote:      val.target?.selector?.exact || '',
    note:       val.body?.value || (typeof val.body === 'string' ? val.body : ''),
    tags:       (val.tags || []).join('; '),
    created_at: val.createdAt || '',
  };
}

function buildMarkdown(annotations, collName) {
  const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  const lines = [];

  lines.push(`# ${collName}`);
  lines.push(`*Exported from margin.at on ${date} — ${annotations.length} annotation${annotations.length !== 1 ? 's' : ''}*`);
  lines.push('');

  annotations.forEach((rec, i) => {
    const val   = rec.value || {};
    const type  = annType(rec);
    const url   = val.target?.source || '';
    const title = val.target?.title  || '';
    const quote = val.target?.selector?.exact || '';
    const note  = val.body?.value || (typeof val.body === 'string' ? val.body : '');
    const tags  = val.tags || [];
    const date  = val.createdAt ? formatDate(val.createdAt) : '';

    // Section heading
    const heading = title || url || `Annotation ${i + 1}`;
    lines.push(`## ${heading}`);

    // Metadata line
    const meta = [];
    meta.push(`**${capitalize(type)}**`);
    if (date) meta.push(date);
    if (url && title) meta.push(`[${url}](${url})`);
    else if (url) meta.push(`[Source](${url})`);
    lines.push(meta.join(' · '));
    lines.push('');

    // Quote block for highlights/annotations with selected text
    if (quote) {
      quote.split('\n').forEach(l => lines.push(`> ${l}`));
      lines.push('');
    }

    // Note / body text
    if (note) {
      lines.push(note);
      lines.push('');
    }

    // Tags
    if (tags.length) {
      lines.push(tags.map(t => `\`${t}\``).join(' '));
      lines.push('');
    }

    lines.push('---');
    lines.push('');
  });

  return lines.join('\n');
}

function csvCell(v) {
  const s = String(v ?? '');
  if (s.includes(',') || s.includes('"') || s.includes('\n')) {
    return `"${s.replace(/"/g, '""')}"`;
  }
  return s;
}

function download(filename, content, type) {
  const blob = new Blob([content], { type });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ─────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────
let toastTimer;
function toast(msg, error = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (error ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2800);
}

// ─────────────────────────────────────────────
// Utility
// ─────────────────────────────────────────────
function annType(rec) {
  const nsid = rec._nsid || rec.uri?.split('/')[2] || 'annotation';
  return nsid.split('.').pop();
}

function capitalize(s) { return s ? s[0].toUpperCase() + s.slice(1) : s; }

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) { return CSS.escape(String(s ?? '')); }

function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }

function formatDate(iso) {
  try {
    return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
  } catch { return iso; }
}
